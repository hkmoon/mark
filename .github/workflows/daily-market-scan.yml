name: Daily Market Scan

on:
  workflow_dispatch:
  schedule:
    - cron: "20 21 * * 1-5"

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install tabulate

      - name: Run cloud scan
        run: python run_cloud_scan.py

      - name: Publish job summary
        shell: bash
        run: cat scan_report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload scan artifacts
        uses: actions/upload-artifact@v4
        with:
          name: daily-market-scan
          path: |
            scan_report.html
            scan_report.md
            scan_results.csv
          if-no-files-found: warn

      - name: Prepare Pages site
        shell: bash
        run: |
          mkdir -p _site
          cp scan_report.html _site/index.html
          cp scan_report.md _site/scan_report.md
          if [ -f scan_results.csv ]; then cp scan_results.csv _site/scan_results.csv; fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Commit updated history
        shell: bash
        run: |
          if [ -z "$(git status --porcelain report_history/scan_history.csv)" ]; then
            echo "No history changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add report_history/scan_history.csv
          git commit -m "Update scan history"
          git push

      - name: Send Telegram scan report
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python - <<'PY'
          import os
          from pathlib import Path
          from urllib.parse import urlencode
          from urllib.request import Request, urlopen

          required = ["TELEGRAM_BOT_TOKEN", "TELEGRAM_CHAT_ID"]
          missing = [name for name in required if not os.environ.get(name)]
          if missing:
              print(f"Skipping Telegram delivery. Missing secrets: {', '.join(missing)}")
              raise SystemExit(0)

          report_path = Path("scan_report.md")
          report_text = report_path.read_text(encoding="utf-8") if report_path.exists() else "No report generated."
          max_chars = 3500
          message = report_text[:max_chars]
          if len(report_text) > max_chars:
              message += "\n\n(Report truncated to fit Telegram message limits.)"

          token = os.environ["TELEGRAM_BOT_TOKEN"]
          chat_id = os.environ["TELEGRAM_CHAT_ID"]
          api_url = f"https://api.telegram.org/bot{token}/sendMessage"
          payload = urlencode(
              {
                  "chat_id": chat_id,
                  "text": message,
                  "disable_web_page_preview": "true",
              }
          ).encode("utf-8")
          req = Request(api_url, data=payload, method="POST")
          with urlopen(req, timeout=30) as response:
              body = response.read().decode("utf-8")
          print(f"Telegram message sent: {body}")
          PY

  deploy:
    needs: scan
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
