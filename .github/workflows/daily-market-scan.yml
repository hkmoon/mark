name: Daily Market Scan

on:
  workflow_dispatch:
  schedule:
    - cron: "20 21 * * 1-5"

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install tabulate

      - name: Run cloud scan
        run: python run_cloud_scan.py

      - name: Publish job summary
        shell: bash
        run: cat scan_report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload scan artifacts
        uses: actions/upload-artifact@v4
        with:
          name: daily-market-scan
          path: |
            scan_report.html
            scan_report.md
            scan_results.csv
          if-no-files-found: warn

      - name: Prepare Pages site
        shell: bash
        run: |
          mkdir -p _site
          cp scan_report.html _site/index.html
          cp scan_report.md _site/scan_report.md
          if [ -f scan_results.csv ]; then cp scan_results.csv _site/scan_results.csv; fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Commit updated history
        shell: bash
        run: |
          if [ -z "$(git status --porcelain report_history/scan_history.csv)" ]; then
            echo "No history changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add report_history/scan_history.csv
          git commit -m "Update scan history"
          git push

      - name: Email scan report
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: hkmoon@me.com
        run: |
          python - <<'PY'
          import os
          import smtplib
          from email.message import EmailMessage
          from pathlib import Path

          required = ["SMTP_HOST", "SMTP_PORT", "SMTP_USERNAME", "SMTP_PASSWORD", "EMAIL_FROM"]
          missing = [name for name in required if not os.environ.get(name)]
          if missing:
              print(f"Skipping email delivery. Missing secrets: {', '.join(missing)}")
              raise SystemExit(0)

          report_path = Path("scan_report.md")
          html_report_path = Path("scan_report.html")
          csv_path = Path("scan_results.csv")
          report_text = report_path.read_text(encoding="utf-8") if report_path.exists() else "No report generated."
          html_report = html_report_path.read_text(encoding="utf-8") if html_report_path.exists() else None

          msg = EmailMessage()
          msg["Subject"] = "Daily Market Scan"
          msg["From"] = os.environ["EMAIL_FROM"]
          msg["To"] = os.environ["EMAIL_TO"]
          msg.set_content(report_text)
          if html_report:
              msg.add_alternative(html_report, subtype="html")

          if report_path.exists():
              msg.add_attachment(
                  report_path.read_bytes(),
                  maintype="text",
                  subtype="markdown",
                  filename=report_path.name,
              )

          if html_report_path.exists():
              msg.add_attachment(
                  html_report_path.read_bytes(),
                  maintype="text",
                  subtype="html",
                  filename=html_report_path.name,
              )

          if csv_path.exists():
              msg.add_attachment(
                  csv_path.read_bytes(),
                  maintype="text",
                  subtype="csv",
                  filename=csv_path.name,
              )

          host = os.environ["SMTP_HOST"]
          port = int(os.environ["SMTP_PORT"])
          username = os.environ["SMTP_USERNAME"]
          password = os.environ["SMTP_PASSWORD"]

          if port == 465:
              with smtplib.SMTP_SSL(host, port) as server:
                  server.login(username, password)
                  server.send_message(msg)
          else:
              with smtplib.SMTP(host, port) as server:
                  server.starttls()
                  server.login(username, password)
                  server.send_message(msg)

          print("Email sent to hkmoon@me.com")
          PY

  deploy:
    needs: scan
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
